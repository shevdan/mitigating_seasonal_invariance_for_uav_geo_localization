# Dataset configurations for seasonal augmentation
# Each dataset specifies where drone images are located

uavvisloc:
  name: "UAV-VisLoc"
  base_path: "../data/UAV_VisLoc_dataset"
  drone_paths:
    - "01/drone"
    - "02/drone"
    - "03/drone"
    - "04/drone"
    - "05/drone"
    - "06/drone"
    - "07/drone"
    - "08/drone"
    - "09/drone"
    - "10/drone"
    - "11/drone"
  extensions: [".jpg", ".jpeg", ".png", ".JPG", ".JPEG", ".PNG"]
  description: "UAV-VisLoc dataset - all 11 flights, raw drone images"

denseuav:
  name: "DenseUAV"
  base_path: "../data/DenseUAV"
  drone_paths:
    - "train/drone"
    - "test/query_drone"
  extensions: [".jpg", ".jpeg", ".png", ".JPG", ".JPEG", ".PNG"]
  description: "DenseUAV with multiple flight heights (H80, H90, H100)"

sues200:
  name: "SUES-200"
  base_path: "../data/SUES-200-512x512-V2/SUES-200-512x512"
  drone_paths:
    - "drone_view_512"
  extensions: [".jpg", ".jpeg", ".png", ".JPG", ".JPEG", ".PNG"]
  description: "SUES-200 drone-satellite dataset"

university1652:
  name: "University-1652"
  base_path: "../data/University-Release"
  drone_paths:
    - "train/drone"
    - "test/query_drone"
  extensions: [".jpg", ".jpeg", ".png", ".JPG", ".JPEG", ".PNG"]
  description: "University-1652 cross-view dataset"
